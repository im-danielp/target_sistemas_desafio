name: target
description: "Desafio de aplicativo proposto pela empresa Target Sistemas."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mobx: ^2.6.0
  flutter_mobx: ^2.3.0
  get_it: ^9.2.1
  google_fonts: ^8.0.2
  gap: ^3.0.1
  curved_navigation_bar: ^1.0.6
  fl_chart: ^1.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mobx_codegen: ^2.7.7
  build_runner: ^2.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/splash/
    - assets/icon/
